<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Đăng nhập</title>
  <style>
    :root {
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #172033;
      background: #f4f7fb;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at top left, rgba(15, 23, 42, 0.18), transparent 34%),
        radial-gradient(circle at bottom right, rgba(14, 165, 233, 0.12), transparent 30%),
        #f4f7fb;
    }

    .login-card {
      width: min(100%, 420px);
      padding: 36px;
      border: 1px solid rgba(15, 23, 42, 0.08);
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.96);
      box-shadow: 0 24px 60px rgba(15, 23, 42, 0.12);
    }

    .logo {
      width: 52px;
      height: 52px;
      margin-bottom: 22px;
      display: grid;
      place-items: center;
      border-radius: 15px;
      background: #111827;
      color: #fff;
      font-size: 24px;
      font-weight: 800;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      line-height: 1.2;
    }

    .subtitle {
      margin: 0 0 28px;
      color: #64748b;
      font-size: 15px;
      line-height: 1.6;
    }

    .field {
      margin-bottom: 18px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 650;
    }

    input {
      width: 100%;
      height: 48px;
      border: 1px solid #cbd5e1;
      border-radius: 12px;
      padding: 0 14px;
      background: #fff;
      color: #172033;
      font: inherit;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    input:focus {
      border-color: #111827;
      box-shadow: 0 0 0 4px rgba(17, 24, 39, 0.16);
    }

    .options {
      margin: 2px 0 22px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      font-size: 14px;
    }

    .remember {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: #475569;
      cursor: pointer;
    }

    .remember input {
      width: 16px;
      height: 16px;
      margin: 0;
      accent-color: #111827;
    }

    a {
      color: #111827;
      font-weight: 650;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    button {
      width: 100%;
      height: 50px;
      border: 0;
      border-radius: 12px;
      background: #111827;
      color: #fff;
      font: inherit;
      font-weight: 750;
      cursor: pointer;
      transition: transform 0.15s ease, background 0.2s ease;
    }

    button:hover {
      background: #000000;
    }

    button:active {
      transform: translateY(1px);
    }

    .message {
      min-height: 22px;
      margin: 14px 0 0;
      color: #15803d;
      font-size: 14px;
      text-align: center;
    }

    .register {
      margin: 22px 0 0;
      color: #64748b;
      font-size: 14px;
      text-align: center;
    }

    @media (max-width: 480px) {
      body {
        padding: 16px;
      }

      .login-card {
        padding: 28px 22px;
        border-radius: 16px;
      }
    }
  </style>
</head>
<body>
  <main class="login-card">
    <div class="logo" aria-hidden="true">L</div>

    <h1>Chào mừng trở lại</h1>
    <p class="subtitle">Đăng nhập để tiếp tục sử dụng tài khoản của bạn.</p>

    <form id="login-form">
      <div class="field">
        <label for="email">Email</label>
        <input
          id="email"
          name="email"
          type="email"
          placeholder="name@example.com"
          autocomplete="email"
          required
        />
      </div>

      <div class="field">
        <label for="password">Mật khẩu</label>
        <input
          id="password"
          name="password"
          type="password"
          placeholder="Nhập mật khẩu"
          autocomplete="current-password"
          minlength="6"
          required
        />
      </div>

      <div class="options">
        <label class="remember" for="remember">
          <input id="remember" name="remember" type="checkbox" />
          Ghi nhớ đăng nhập
        </label>
        <a href="#">Quên mật khẩu?</a>
      </div>

      <button type="submit">Đăng nhập</button>
      <p id="message" class="message" role="status" aria-live="polite"></p>
    </form>

    <p class="register">Chưa có tài khoản? <a href="#">Đăng ký</a></p>
  </main>

  <script>
    const form = document.getElementById('login-form');
    const message = document.getElementById('message');

    form.addEventListener('submit', (event) => {
      event.preventDefault();

      if (!form.checkValidity()) {
        form.reportValidity();
        return;
      }

      const email = new FormData(form).get('email');
      message.textContent = `Đăng nhập thành công với ${email}`;
    });
  </script>
</body>
</html>
