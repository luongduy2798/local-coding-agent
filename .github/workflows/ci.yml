name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  server:
    name: Server (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json
      - name: Install server dependencies
        run: npm ci
        working-directory: server
      - name: Check syntax and shipped scripts
        working-directory: server
        run: |
          node --check server.mjs
          node --check src/server.mjs
          node --check src/change-journal.mjs
          node --check src/core/redaction.mjs
          node --check src/integrations/figma-desktop.mjs
          node --check scripts/check-test-safety.mjs
          node --check tests/helpers/test-guard.mjs
          node --check tests/helpers/test-runtime.mjs
          node --check tests/test-guard.test.mjs
          node --check tests/runners/run-agent-isolated.mjs
          node --check tests/runners/run-security-isolated.mjs
          node --check tests/integration/change-journal.test.mjs
          node --check tests/integration/agent.test.mjs
          node --check tests/integration/pro.test.mjs
          node --check tests/integration/hardening.test.mjs
          node --check tests/integration/figma-desktop.test.mjs
          node --check tests/security/runtime.test.mjs
          node --check tests/security/baseline.test.mjs
          node --check ../evals/run.mjs
          node --check ../scripts/local-coding-agent.mjs
          node --check ../scripts/local-coding-agent.test.mjs
          node --check ../scripts/network-doctor.mjs
          node --test ../scripts/network-doctor.test.mjs
          node --test ../scripts/local-coding-agent.test.mjs
          node --check ../scripts/validate-skills.mjs
          node ../scripts/local-coding-agent.mjs --help
          node ../scripts/local-coding-agent.mjs setup --help
          node ../scripts/network-doctor.mjs --help
          node ../scripts/validate-skills.mjs
          node ../scripts/local-coding-agent.mjs skills validate
      - name: Parse Bash launcher
        if: runner.os != 'Windows'
        shell: bash
        run: bash -n scripts/lca
      - name: Test safety gate
        run: npm run test:safety
        working-directory: server
      - name: Change Journal tests
        run: npm run test:changes
        working-directory: server
      - name: Agent tool tests
        run: npm run test:agent
        working-directory: server
      - name: Pro tests
        run: npm run test:pro
        working-directory: server
      - name: Hardening tests
        run: npm run test:hardening
        working-directory: server
      - name: Figma bridge tests
        run: npm run test:figma
        working-directory: server
      - name: Isolated security tests
        run: npm run test:security
        working-directory: server
        env:
          LCA_REAL_REPO: ${{ github.workspace }}

  eval:
    name: Eval suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
        working-directory: server
      - name: Test safety gate
        run: npm run test:safety
        working-directory: server
      - name: Run evals
        run: npm run eval
        working-directory: server
